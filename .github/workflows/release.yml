name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . pytest==9.0.2 pytest-cov==7.0.0 ruff==0.6.9 pip-audit==2.10.0 mypy==1.11.2 build twine

      - name: Lint
        run: ruff check src tests scripts

      - name: Type check
        run: python -m mypy src

      - name: Run tests
        run: PYTHONPATH=src pytest -q --cov=src/askfind --cov-fail-under=95

      - name: Security audit
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pip-audit-cache"
          set +e
          pip-audit -r requirements.txt -f json --aliases on --desc off \
            --cache-dir "$RUNNER_TEMP/pip-audit-cache" > pip-audit.json
          audit_exit=$?
          set -e
          if [ "$audit_exit" -ne 0 ] && [ "$audit_exit" -ne 1 ]; then
            echo "pip-audit failed with unexpected exit code: $audit_exit" >&2
            exit "$audit_exit"
          fi
          python scripts/ci/pip_audit_gate.py --input pip-audit.json --min-severity medium

      - name: Build distribution artifacts
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-dist
          path: dist/*
