name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Validate dev tool pins
        run: python scripts/ci/check_dev_tool_pins.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . pytest==9.0.2 pytest-cov==7.0.0 ruff==0.6.9 pip-audit==2.10.0 mypy==1.11.2

      - name: Lint
        run: ruff check src tests scripts

      - name: Type check
        run: python -m mypy src

      - name: Security audit
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pip-audit-cache"
          set +e
          pip-audit -r requirements.txt -f json --aliases on --desc off \
            --cache-dir "$RUNNER_TEMP/pip-audit-cache" > pip-audit.json
          audit_exit=$?
          set -e
          if [ "$audit_exit" -ne 0 ] && [ "$audit_exit" -ne 1 ]; then
            echo "pip-audit failed with unexpected exit code: $audit_exit" >&2
            exit "$audit_exit"
          fi
          python scripts/ci/pip_audit_gate.py --input pip-audit.json --min-severity high

      - name: Run tests
        run: PYTHONPATH=src pytest -q --cov=src/askfind --cov-fail-under=95

      - name: Performance regression gate
        run: PYTHONPATH=src python scripts/ci/benchmark_regression_gate.py --root .

      - name: Index query regression gate
        run: PYTHONPATH=src python scripts/ci/index_query_regression_gate.py --root .
