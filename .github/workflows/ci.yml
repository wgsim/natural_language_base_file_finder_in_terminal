name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_benchmark_compare:
        description: "Run optional benchmark baseline comparison job"
        required: false
        default: "false"
      benchmark_baseline_json:
        description: "Baseline JSON path committed in repo"
        required: false
        default: "docs/benchmarks/2026-02-28/s1_workers4.json"
      benchmark_repeats:
        description: "Benchmark repeats for candidate run"
        required: false
        default: "3"
      benchmark_ratio_threshold:
        description: "Allowed candidate/baseline ratio"
        required: false
        default: "1.35"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Validate dev tool pins
        run: python scripts/ci/check_dev_tool_pins.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . pytest==9.0.2 pytest-cov==7.0.0 ruff==0.6.9 pip-audit==2.10.0 mypy==1.11.2

      - name: Lint
        run: ruff check src tests scripts

      - name: Type check
        run: python -m mypy src

      - name: Security audit
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pip-audit-cache"
          set +e
          pip-audit -r requirements.txt -f json --aliases on --desc off \
            --cache-dir "$RUNNER_TEMP/pip-audit-cache" > pip-audit.json
          audit_exit=$?
          set -e
          if [ "$audit_exit" -ne 0 ] && [ "$audit_exit" -ne 1 ]; then
            echo "pip-audit failed with unexpected exit code: $audit_exit" >&2
            exit "$audit_exit"
          fi
          python scripts/ci/pip_audit_gate.py --input pip-audit.json --min-severity high

      - name: Run tests
        run: PYTHONPATH=src pytest -q --cov=src/askfind --cov-fail-under=95

      - name: Performance regression gate
        run: PYTHONPATH=src python scripts/ci/benchmark_regression_gate.py --root .

      - name: Index query regression gate
        run: PYTHONPATH=src python scripts/ci/index_query_regression_gate.py --root .

  offline-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Offline smoke checks
        run: |
          set -euo pipefail
          ROOT="$(mktemp -d)"
          mkdir -p "$ROOT/src"
          printf '# TODO: keep\n' > "$ROOT/src/keep.py"
          printf 'print(\"skip\")\n' > "$ROOT/src/skip.py"
          printf 'TODO but not python\n' > "$ROOT/src/note.txt"

          out="$(askfind 'python files in src containing TODO' --offline --root "$ROOT" --no-cache --no-rerank)"
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "keep.py"
          if printf '%s\n' "$out" | grep -q "skip.py"; then
            echo "offline smoke failed: unexpected skip.py match" >&2
            exit 1
          fi
          if printf '%s\n' "$out" | grep -q "note.txt"; then
            echo "offline smoke failed: unexpected note.txt match" >&2
            exit 1
          fi

          if askfind "find files" --offline --root "$ROOT" --no-cache > /tmp/offline-broad.out 2> /tmp/offline-broad.err; then
            echo "offline smoke failed: broad query unexpectedly succeeded" >&2
            exit 1
          fi
          grep -qi "too broad" /tmp/offline-broad.err

  benchmark-compare:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmark_compare == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Generate candidate benchmark artifact
        run: |
          PYTHONPATH=src python scripts/bench/benchmark_walk.py \
            --root . \
            --repeats "${{ inputs.benchmark_repeats }}" \
            --workers 4 \
            --output-json /tmp/askfind-benchmark-candidate.json

      - name: Compare baseline and candidate benchmark artifacts
        run: |
          python scripts/bench/compare_benchmark_results.py \
            --baseline "${{ inputs.benchmark_baseline_json }}" \
            --candidate /tmp/askfind-benchmark-candidate.json \
            --metric median_s \
            --ratio-threshold "${{ inputs.benchmark_ratio_threshold }}"
