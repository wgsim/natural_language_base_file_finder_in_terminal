name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . pytest==9.0.2 pytest-cov==7.0.0 ruff>=0.6

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: PYTHONPATH=src pytest -q --cov=src/askfind --cov-fail-under=85
